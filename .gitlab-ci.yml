# for Cloudflare Workers (as of 2025-05-30)

stages:
  - deploy

image: node:latest

variables:
  CLOUDFLARE_API_TOKEN: $CFW_API_TOKEN
  CLOUDFLARE_ACCOUNT_ID: $CF_ACCOUNT_ID
  # HUGO_VERSION: 0.161.1
  NODE_PKGS: "false" # choices: 'true' and 'false' (mainly checking only for [== "true"])
  #    including use of (e.g.) PostCSS, even if not doing `npm run build`
  NODE_VERSION: 24.x
  # ^^ (Node.js version to use; needed at least for wrangler on CFW)
  NPM_RUN_BUILD: "false" # choices: 'true' and 'false'
  # ^^ refers to whether we're using `npm run build` to build the site
  GIT_DEPTH: 0 # for proper use of Hugo's Git info variables
  GIT_STRATEGY: clone
  MY_WEBSITE: https://www.brycewray.com
  TZ: America/Chicago

deploySite:
  stage: deploy
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  environment:
    name: production
    url: $MY_WEBSITE
  script:
    - >
      if [ "$NODE_PKGS" == "true" ]; then
        echo "Installing npm packages .."
        npm ci
      fi
    - >
      if [ -f .hvm ]; then
        hvm_raw=$(cat .hvm)
        HUGO_VERSION=$(echo "${hvm_raw%/*}" | tr -d 'v')
      fi
    - echo "Downloading and installing Hugo v.$HUGO_VERSION ..."
    - curl -LJO https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_${HUGO_VERSION}_linux-amd64.deb
    - apt install -y ./hugo_${HUGO_VERSION}_linux-amd64.deb
    - rm hugo_${HUGO_VERSION}_linux-amd64.deb
    - >
      if [ "$NPM_RUN_BUILD" != "true" ]; then
        echo "Building the site with Hugo ..."
        hugo --gc --minify --logLevel info
        echo "Moving excerpted RSS to root ..."
        mv public/posts/index.xml public/index-excerpts.xml
        mv public/posts/index.json public/index-excerpts.json
        echo "Running Pagefind ..."
        npm_config_yes=true npx pagefind@latest --site "public"
      else
        echo "Using \`npm run build\` to build the site and run Pagefind ..."
        npm run build
      fi
    - echo "Publishing site to Cloudflare Workers ..."
    - npm_config_yes=true npx wrangler deploy
# To do a push without triggering this pipeline, include one of
# the following in the **commit message**
# (INCLUDING the brackets AND case-sensitivity):
#
# [skip ci] (works also in CFP GUI)
# [ci skip] (works also in CFP GUI)
