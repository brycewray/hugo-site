name: Deploy website

on:
  schedule:
    - cron: "0 6 1 1 *" # January 1 at 6 AM UTC
  push:
    branches:
      - main

env:
  HOST: CFW # choices: 'CFW' (Cloudflare Workers) or 'Netlify' or 'Vercel'
  NODE_PKGS:  false # choices: 'true' and 'false' (mainly checking only for [== "true"])
  #    including use of (e.g.) PostCSS, even if not doing `npm run build`
  NODE_VERSION: 24
  # ^^ (Node.js version to use; needed at least for wrangler on CFW)
  NPM_RUN_BUILD: false # choices: 'true' and 'false'
  # ^^ refers to whether we're using `npm run build` to build the site
  TZ: America/Chicago

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Set up Node.js
        # needed for wrangler and set-timezone, at least
        # if: ${{ env.NODE == 'true' }}
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Checkout default branch
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0 # for proper use of Hugo's Git info variables
      - name: Install npm packages if applicable
        if: ${{ env.NODE_PKGS == 'true' }}
        run: "[[ -f package-lock.json || -f npm-shrinkwrap.json ]] && npm ci || true"
        #   ... not `npm install`
        #   `npm ci` won't work without an existing package-lock.json or npm-shrinkwrap.json; above is based on https://github.com/actions/starter-workflows/blob/main/pages/hugo.yml
      - name: Hugo download/install
        # h/t:
        # - https://github.com/jmooring/hvm/issues/218
        # - https://github.com/jmooring/hosting-github-pages-hvm/blob/main/.github/workflows/hugo.yaml#L54-L74
        run: |
          if [ -f .hvm ]; then
            hvm_raw=$(cat .hvm)
            HUGO_VERSION=$(echo "${hvm_raw%/*}" | tr -d 'v')
          fi
          wget https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_${HUGO_VERSION}_linux-amd64.deb -O hugo_${HUGO_VERSION}_linux-amd64.deb
          sudo dpkg -i hugo*.deb
      - name: Cache appropriate Hugo items
        id: cache-hugosite
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            resources
            static
          key: ${{ runner.os }}-hugosite
      - name: Build site (with `npm run build`)
        if: ${{ env.NPM_RUN_BUILD == 'true' }}
        run: npm run build
      - name: Build site (not with `npm run build`)
        if: ${{ env.NPM_RUN_BUILD != 'true' }}
        run: |
          hugo --gc --minify --logLevel info
          mv public/posts/index.xml public/index-excerpts.xml
          mv public/posts/index.json public/index-excerpts.json
          npm_config_yes=true npx pagefind@latest --site "public"
      - name: Pre-install wrangler to squelch CFW warnings in GHA
        # https://github.com/cloudflare/wrangler-action/issues/286
        if: ${{ env.HOST == 'CFW' }}
        run: npm i -g wrangler
      - name: Publish to CFW
        if: ${{ env.HOST == 'CFW' }}
        uses: cloudflare/wrangler-action@ebbaa1584979971c8614a24965b4405ff95890e0 # v4.0.0
        with:
          apiToken: ${{ secrets.CFW_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
      # - name: Install Netlify CLI
